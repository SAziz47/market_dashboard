name: Refresh dashboard data

on:
  schedule:
    - cron: "00 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build data
        run: python scripts/build_data.py --out-dir data

      - name: Commit & push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: refresh data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push --force origin main

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - uses: actions/deploy-pages@v4
        id: deployment
```

Click **"Commit new file"** → **"Commit changes"**

---

**Step 3 — Confirm the fix is there**

After saving, you'll see the file. Look for this line near the bottom of the build job:
```
git push --force origin main
```
If you see `--force` it's correct. If you only see `git push origin main` the edit didn't save again.

